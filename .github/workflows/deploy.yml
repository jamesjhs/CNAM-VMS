name: Build and Deploy via Cloudflare Tunnel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Compress files
        run: |
          # 1. Create the zip file one folder level OUTSIDE our current directory
          tar -czf ../deploy.tar.gz --exclude=.git --exclude=node_modules .
          
          # 2. Move the finished zip file back INSIDE our current directory
          mv ../deploy.tar.gz .
          
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH Context
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Stripped out the broken flags. It just points to your host now.
          cat <<EOF > ~/.ssh/config
          Host $SERVER_HOST
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Transfer and Deploy over Tunnel
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          # THE FIX: These are the exact variable names cloudflared actually looks for
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          # 1. Send the file over the tunnel
          scp deploy.tar.gz nodeapp@$SERVER_HOST:/var/node/cnamvms.jahosi.co.uk-3001/
          
          # 2. Execute the remote commands
          ssh nodeapp@$SERVER_HOST << 'EOF'
            cd /var/node/cnamvms.jahosi.co.uk-3001/
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            npm ci --omit=dev
            
            # Restart PM2
            pm2 restart CNAM3001
          EOF
