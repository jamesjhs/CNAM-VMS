name: Build and Deploy via Cloudflare Tunnel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Verify package-lock.json
        run: |
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json not found! This is required for reproducible builds."
            exit 1
          fi

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          if [ ! -d .next/standalone ]; then
            echo "ERROR: Build failed - .next/standalone directory not created"
            exit 1
          fi
          if [ ! -f .next/standalone/server.js ]; then
            echo "ERROR: Build failed - server.js not created"
            exit 1
          fi

      - name: Compress files
        run: |
          # Create the deployment archive
          tar -czf ../deploy.tar.gz --exclude=.git --exclude=node_modules --exclude=.next .
          
          # Move the archive back to current directory
          mv ../deploy.tar.gz .
          
          # Verify archive was created and isn't empty
          if [ ! -f deploy.tar.gz ] || [ ! -s deploy.tar.gz ]; then
            echo "ERROR: Failed to create deployment archive"
            exit 1
          fi
          
          # Show archive size for debugging
          ls -lh deploy.tar.gz
          
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      - name: Setup SSH Context
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          cat <<EOF > ~/.ssh/config
          Host $SERVER_HOST
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Transfer and Deploy over Tunnel
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          set -e  # Exit on first error
          
          DEPLOY_DIR="/var/node/cnamvms.jahosi.co.uk-3001"
          
          echo "Transferring deployment archive..."
          scp -o ConnectTimeout=30 -o StrictHostKeyChecking=no deploy.tar.gz nodeapp@$SERVER_HOST:$DEPLOY_DIR/
          
          echo "Executing remote deployment steps..."
          ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no nodeapp@$SERVER_HOST << 'EOF'
            set -e
            
            DEPLOY_DIR="/var/node/cnamvms.jahosi.co.uk-3001"
            cd "$DEPLOY_DIR"
            
            # Verify archive exists and is not corrupted
            if [ ! -f deploy.tar.gz ]; then
              echo "ERROR: deploy.tar.gz not found on remote server"
              exit 1
            fi
            
            echo "Extracting archive..."
            tar -tzf deploy.tar.gz > /dev/null || (echo "ERROR: Archive is corrupted"; exit 1)
            
            # Backup current state
            if [ -d current ]; then
              echo "Backing up current deployment..."
              mv current current.backup.$(date +%s)
            fi
            
            # Extract to temporary directory, then move
            echo "Extracting deployment..."
            mkdir -p current
            tar -xzf deploy.tar.gz -C current
            
            echo "Installing dependencies..."
            cd current
            npm ci --omit=dev --verbose
            
            # Verify critical files exist
            if [ ! -f .next/standalone/server.js ]; then
              echo "ERROR: server.js missing after extraction. Deployment failed."
              cd ..
              rm -rf current
              if [ -d current.backup.* ]; then
                mv current.backup.* current
              fi
              exit 1
            fi
            
            echo "Cleaning up..."
            rm -f $DEPLOY_DIR/deploy.tar.gz
            
            echo "Restarting application..."
            pm2 restart CNAM3001 || (echo "ERROR: PM2 restart failed"; exit 1)
            
            # Wait for app to be ready
            sleep 3
            
            if pm2 info CNAM3001 | grep -q "online"; then
              echo "✓ Deployment successful - application is online"
            else
              echo "ERROR: Application failed to start after deployment"
              exit 1
            fi
          EOF
          
      - name: Deployment Failed Notification
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above for details."
          exit 1
